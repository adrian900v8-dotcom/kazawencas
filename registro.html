<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - KAZAWENCA'S</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-body">

    <div id="menu-contenedor"></div>

    <main class="page-wrapper d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="container mb-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">
                        
                        <div class="text-center mb-4">
                            <h3 class="fw-bold" style="font-family: 'Montserrat', sans-serif; color: var(--color-dark);">Crear Cuenta</h3>
                            <p class="text-muted">Únete a la experiencia Kazawenca's</p>
                        </div>
                        
                        <form id="form-registro">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary small">Nombre Completo</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                                    <input type="text" id="nombre" class="form-control form-control-lg bg-light border-start-0 fs-6" placeholder="Tu nombre" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary small">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" id="email" class="form-control form-control-lg bg-light border-start-0 fs-6" placeholder="ejemplo@correo.com" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary small">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" id="password" class="form-control form-control-lg bg-light border-start-0 fs-6" placeholder="********" required>
                                </div>
                            </div>
                            
                            <button type="submit" class="w-100 shadow-sm" style="background-color: var(--btn-green-dark); color: white; padding: 12px; border-radius: 50rem; font-weight: 600; border: none; transition: 0.3s;">
                                Registrarse
                            </button>
                            
                            <div class="text-center mt-4">
                                <span class="text-muted fs-6">¿Ya tienes cuenta?</span> 
                                <a href="login.html" class="text-decoration-none fw-bold" style="color: var(--btn-green-dark);">Iniciar sesión</a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="nav.js"></script>
    <script src="registro.js"></script> 
</body>
</html>
