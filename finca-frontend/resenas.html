<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reseñas - KAZAWENCA'S</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-light"> 
    
    <div id="menu-contenedor"></div>

    <main class="page-wrapper">
        
        <div class="container text-center mb-5">
            <h2 class="mb-4 text-success fw-bold">Área de Clientes</h2>
            <p class="lead text-muted mb-5">Tu opinión es muy importante para nosotros. Comparte tu experiencia en KAZAWENCA'S.</p>
            
            <button type="button" class="btn btn-success btn-lg fw-bold px-5 rounded-pill shadow hover-scale" data-bs-toggle="modal" data-bs-target="#modalResena">
                <i class="bi bi-star-fill me-2"></i> Calificar Experiencia
            </button>
        </div>

        <div class="container mt-5">
            <h3 class="mb-4 text-secondary border-bottom pb-2 text-center">Lo que dicen nuestros clientes</h3>
            
            <div id="contenedor-resenas" class="row g-4 justify-content-center">
                <div class="col-12 text-center">
                    <div class="spinner-border text-success" role="status">
                        <span class="visually-hidden">Cargando reseñas...</span>
                    </div>
                    <p class="mt-2 text-muted">Cargando experiencias...</p>
                </div>
            </div>
        </div>

    </main>

    <div class="modal fade" id="modalResena" tabindex="-1" aria-labelledby="modalResenaLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title fw-bold" id="modalResenaLabel">Dejar una Reseña</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="form-resena">
                        <div class="mb-4 text-center">
                            <label class="form-label fw-bold d-block text-start">¿Cómo calificarías tu experiencia?</label>
                            <div id="selector-estrellas" class="d-inline-block" style="cursor: pointer;">
                                <i class="bi bi-star star-interactive" data-value="1"></i>
                                <i class="bi bi-star star-interactive" data-value="2"></i>
                                <i class="bi bi-star star-interactive" data-value="3"></i>
                                <i class="bi bi-star star-interactive" data-value="4"></i>
                                <i class="bi bi-star star-interactive" data-value="5"></i>
                            </div>
                            <input type="hidden" id="calificacion" required>
                            <div class="text-danger mt-1 d-none" id="error-calificacion" style="font-size: 0.875em; text-align: left;">
                                Por favor, selecciona una calificación.
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="comentario" class="form-label fw-bold">Cuéntanos tu experiencia</label>
                            <textarea class="form-control" id="comentario" rows="4" placeholder="La finca es espectacular, las camas son..." required></textarea>
                        </div>
                        <div id="alerta-resena" class="alert d-none" role="alert"></div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-success fw-bold" id="btn-enviar-resena">Enviar Reseña</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/resenas.js"></script> 
</body>
</html>
