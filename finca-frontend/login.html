<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - KAZAWENCA'S</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="page-body">

    <div id="menu-contenedor"></div>

    <main class="page-wrapper d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="container mb-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">
                        
                        <div class="text-center mb-4">
                            <img src="img/logopng.png" alt="Logo KAZAWENCA'S" height="60" class="mb-3" style="filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1));">
                            <h3 class="fw-bold" style="font-family: 'Montserrat', sans-serif; color: var(--color-dark);">Iniciar Sesión</h3>
                            <p class="text-muted">Bienvenido de nuevo a nuestro paraíso</p>
                        </div>
                        
                        <!-- Configuración del botón de Google -->
                        <div id="g_id_onload"
                             data-client_id="474218595650-6ug5qq9387rv0aj2r1ic6ve35d5elilc.apps.googleusercontent.com"
                             data-context="signin"
                             data-ux_mode="popup"
                             data-callback="handleCredentialResponse"
                             data-auto_prompt="false">
                        </div>

                        <div class="g_id_signin mb-3"
                             data-type="standard"
                             data-shape="rectangular"
                             data-theme="outline"
                             data-text="signin_with"
                             data-size="large"
                             data-logo_alignment="center"
                             data-width="100%">
                        </div>

                        <div class="text-center my-3 text-muted d-flex align-items-center justify-content-center" style="font-size: 0.85rem;">
                            <hr class="flex-grow-1 mx-2">
                            <span>o ingresa con tu correo</span>
                            <hr class="flex-grow-1 mx-2">
                        </div>

                        <form id="form-login">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary small">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" id="email" class="form-control form-control-lg bg-light border-start-0 fs-6" placeholder="ejemplo@correo.com" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary small">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" id="password" class="form-control form-control-lg bg-light border-start-0 fs-6" placeholder="********" required>
                                </div>
                            </div>
                            
                            <button type="submit" class="w-100 shadow-sm" style="background-color: var(--btn-green-dark); color: white; padding: 12px; border-radius: 50rem; font-weight: 600; border: none; transition: 0.3s;">
                                Entrar
                            </button>
                            
                            <div class="text-center mt-4">
                                <span class="text-muted fs-6">¿No tienes cuenta?</span> 
                                <a href="registro.html" class="text-decoration-none fw-bold" style="color: var(--btn-green-dark);">Crear cuenta aquí</a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/login.js"></script> 
</body>
</html>
